version: '3.8'

services:
  onlyoffice:
    image: onlyoffice/documentserver:latest
    container_name: onlyoffice-docs
    ports:
      - "8080:80"
    volumes:
      - onlyoffice_data:/var/www/onlyoffice/Data
      - onlyoffice_logs:/var/log/onlyoffice
    restart: unless-stopped
    environment:
      - JWT_ENABLED=false

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: onlyoffice-backend
    ports:
      - "3000:3000"
    volumes:
      - backend_files:/app/files
    environment:
      - PORT=3000
      - ONLYOFFICE_URL=http://onlyoffice:80
      - APP_URL=http://host.docker.internal:3000
      - FILES_DIR=./files
      - ONLYOFFICE_SECRET=${ONLYOFFICE_SECRET:-}
    depends_on:
      - onlyoffice
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: onlyoffice-frontend
    ports:
      - "8081:8081"
    environment:
      - VITE_API_URL=http://localhost:3000
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  onlyoffice_data:
  onlyoffice_logs:
  backend_files:
